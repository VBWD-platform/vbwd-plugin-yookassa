name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          path: vbwd-backend

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Install plugin into backend
        run: |
          rsync -a --exclude='.git' --exclude='.github' \
            plugin-src/ vbwd-backend/plugins/yookassa/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vbwd-backend/requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/vbwd-backend
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd
        run: |
          cd vbwd-backend
          if [ -d "plugins/yookassa/tests/unit" ]; then
            pytest plugins/yookassa/tests/unit/ -v --tb=short
          elif [ -d "plugins/yookassa/tests" ]; then
            pytest plugins/yookassa/tests/ -v --tb=short \
              --ignore=plugins/yookassa/tests/integration/
          else
            echo "No tests found for yookassa — skipping."
          fi

  integration:
    name: Integration Tests
    needs: unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vbwd
          POSTGRES_PASSWORD: vbwd
          POSTGRES_DB: vbwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          path: vbwd-backend

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Install plugin into backend
        run: |
          rsync -a --exclude='.git' --exclude='.github' \
            plugin-src/ vbwd-backend/plugins/yookassa/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vbwd-backend/requirements.txt

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}/vbwd-backend
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd
        run: |
          cd vbwd-backend
          if [ -d "plugins/yookassa/tests/integration" ]; then
            pytest plugins/yookassa/tests/integration/ -v --tb=short
          else
            echo "No integration tests for yookassa — skipping."
          fi
