name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — yookassa
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/yookassa

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - run: pip install -r vbwd-backend/requirements.txt

      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      - name: Wait for API
        working-directory: vbwd-backend
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:5000/api/v1/health > /dev/null 2>&1 && break; sleep 2; done

      - name: Run pre-commit (lint + unit)
        working-directory: vbwd-backend
        run: docker compose run --rm test ./bin/pre-commit-check.sh --plugin yookassa --quick

      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
